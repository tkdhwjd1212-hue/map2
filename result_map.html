qyh4WgHDFoSV7rG1oNx-rFQRwKpaxbTbjtqKCjRCPYohfD2AL1RU9Sbw/exec';\n  var adminPassword = '1234';\n\n  var surveyUser = sessionStorage.getItem('survey_user') ||\n                   prompt('조사자 이름을 입력하세요','조사자') ||\n                   '조사자';\n\n  sessionStorage.setItem('survey_user', surveyUser);\n\n  // 현재 위치 마커/정확도 원\n  var meMarker = null;\n  var meCircle = null;\n\n  var surveyLayer = L.layerGroup().addTo(map);\n  var surveyMarkers = {};\n  var surveyData = [];\n\n  function clearSurveyMarkers(){\n    surveyLayer.clearLayers();\n    surveyMarkers = {};\n  }\n\n  function updateProgress(){\n    var doneCount = surveyData.filter(function(p){\n      return p.status === '완료';\n    }).length;\n\n    var percent = totalCount > 0 ? Math.round((doneCount / totalCount) * 100) : 0;\n\n    var box = document.getElementById('surveyProgressBox');\n    if(box){\n      box.innerHTML =\n        '<b>조사진행률<\/b><br>' +\n        doneCount + ' / ' + totalCount + ' (' + percent + '%)';\n    }\n  }\n\n  function renderSurveyData(){\n    clearSurveyMarkers();\n\n    surveyData.forEach(function(p){\n      if(p.lat === undefined || p.lng === undefined || isNaN(p.lat) || isNaN(p.lng)) return;\n\n      var color = 'green';\n      if(p.status === '폐업') color = 'red';\n      if(p.status === '거절') color = 'orange';\n\n      var marker = L.circleMarker([p.lat, p.lng], {\n        radius: 8,\n        color: color,\n        fillColor: color,\n        fillOpacity: 0.9,\n        interactive: false\n      }).addTo(surveyLayer);\n\n      surveyMarkers[p.code] = marker;\n    });\n\n    updateProgress();\n  }\n\n  function fetchSurveyData(){\n    fetch(GAS_URL + '?action=list&ts=' + Date.now())\n      .then(function(res){ return res.json(); })\n      .then(function(data){\n        if(!Array.isArray(data)){\n          console.log('데이터 형식 오류', data);\n          return;\n        }\n        surveyData = data;\n        renderSurveyData();\n      })\n      .catch(function(err){\n        console.log('공유 데이터 불러오기 실패:', err);\n      });\n  }\n\n  function saveSurveyPoint(code, lat, lng, status){\n    var url =\n      GAS_URL +\n      '?action=save' +\n      '&code=' + encodeURIComponent(code) +\n      '&status=' + encodeURIComponent(status) +\n      '&user=' + encodeURIComponent(surveyUser) +\n      '&lat=' + encodeURIComponent(lat) +\n      '&lng=' + encodeURIComponent(lng) +\n      '&ts=' + Date.now();\n\n    fetch(url)\n      .then(function(res){ return res.json(); })\n      .then(function(data){\n        if(!data.ok){\n          console.log('저장 실패 응답', data);\n          alert('저장에 실패했습니다.');\n          return;\n        }\n        fetchSurveyData();\n      })\n      .catch(function(err){\n        console.log('공유 데이터 저장 실패:', err);\n        alert('저장에 실패했습니다.');\n      });\n  }\n\n  function downloadCSV(){\n    if(!surveyData.length){\n      alert('다운로드할 조사 기록이 없습니다.');\n      return;\n    }\n\n    var csv = '\\uFEFFCODE,status,time,user,lat,lng\\n';\n\n    surveyData.forEach(function(p){\n      var time = p.time ? String(p.time).replace(/,/g, ' ') : '';\n      var user = p.user ? String(p.user).replace(/,/g, ' ') : '';\n      csv += [\n        p.code || '',\n        p.status || '',\n        time,\n        user,\n        p.lat || '',\n        p.lng || ''\n      ].join(',') + '\\n';\n    });\n\n    var blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });\n    var url = URL.createObjectURL(blob);\n\n    var link = document.createElement('a');\n    link.href = url;\n    link.download = 'survey_points.csv';\n    document.body.appendChild(link);\n    link.click();\n    document.body.removeChild(link);\n  }\n\n  function resetSurveyData(){\n    var password = prompt('관리자 비밀번호를 입력하세요');\n\n    if(password !== adminPassword){\n      alert('비밀번호가 올바르지 않습니다.');\n      return;\n    }\n\n    if(!confirm('공유 조사 기록을 모두 삭제하시겠습니까?')) return;\n\n    fetch(GAS_URL + '?action=reset&password=' + encodeURIComponent(password) + '&ts=' + Date.now())\n      .then(function(res){ return res.json(); })\n      .then(function(data){\n        if(data.ok){\n          fetchSurveyData();\n          alert('초기화되었습니다.');\n        } else {\n          alert('초기화 실패');\n        }\n      })\n      .catch(function(err){\n        console.log('초기화 실패:', err);\n        alert('초기화 실패');\n      });\n  }\n\n  var customControl = L.control({position:'topright'});\n\n  customControl.onAdd = function(map){\n    var div = L.DomUtil.create('div','leaflet-bar');\n\n    div.style.background = 'white';\n    div.style.padding = '6px';\n    div.style.border = '1px solid #999';\n\n    div.innerHTML =\n      '<div id=\"surveyProgressBox\" style=\"width:160px;margin-bottom:6px;padding:5px 8px;font-size:12px;border:1px solid #ccc;background:#f8f8f8;\"><\/div>' +\n      '<button id=\"resetSurvey\" style=\"display:block;width:160px;margin-bottom:6px;padding:5px 8px;font-size:12px;cursor:pointer;\">조사기록 초기화<\/button>' +\n      '<button id=\"downloadSurvey\" style=\"display:block;width:160px;padding:5px 8px;font-size:12px;cursor:pointer;\">CSV 다운로드<\/button>';\n\n    L.DomEvent.disableClickPropagation(div);\n    return div;\n  };\n\n  customControl.addTo(map);\n\n  setTimeout(function(){\n    var resetBtn = document.getElementById('resetSurvey');\n    var downloadBtn = document.getElementById('downloadSurvey');\n\n    if(resetBtn){\n      resetBtn.onclick = function(){\n        resetSurveyData();\n      };\n    }\n\n    if(downloadBtn){\n      downloadBtn.onclick = function(){\n        downloadCSV();\n      };\n    }\n  }, 500);\n\n  // =========================\n  // 현재 위치 표시 기능 추가\n  // =========================\n  if (!navigator.geolocation) {\n    alert('이 브라우저는 위치 기능을 지원하지 않습니다.');\n    return;\n  }\n\n  navigator.geolocation.watchPosition(\n    function(pos) {\n      var lat = pos.coords.latitude;\n      var lng = pos.coords.longitude;\n      var acc = pos.coords.accuracy;\n\n      if (meMarker) {\n        meMarker.setLatLng([lat, lng]);\n      } else {\n        meMarker = L.circleMarker([lat, lng], {\n          radius: 7,\n          color: 'blue',\n          fillColor: 'blue',\n          fillOpacity: 0.9\n        }).addTo(map);\n      }\n\n      if (meCircle) {\n        meCircle.setLatLng([lat, lng]);\n        meCircle.setRadius(acc);\n      } else {\n        meCircle = L.circle([lat, lng], {\n          radius: acc,\n          color: 'blue',\n          fillColor: 'blue',\n          fillOpacity: 0.15\n        }).addTo(map);\n      }\n\n      // 필요하면 지도 화면이 현재 위치를 따라가게\n      // map.panTo([lat, lng]);\n    },\n    function(err) {\n      console.log(err);\n      alert('위치 권한이 없거나 위치를 가져오지 못했습니다.');\n    },\n    { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }\n  );\n\n  map.on('popupopen', function(e){\n    var popup = e.popup;\n    var layer = popup._source;\n\n    if(!layer || !layer.getLatLng) return;\n\n    var latlng = layer.getLatLng();\n    var lat = latlng.lat;\n    var lng = latlng.lng;\n\n    var contentNode = popup.getElement().querySelector('.leaflet-popup-content');\n    if(!contentNode) return;\n\n    var codeNode = contentNode.querySelector('.survey-code');\n    var code = codeNode ? codeNode.textContent.trim() : null;\n\n    if(contentNode.querySelector('.done-btn')) return;\n\n    function makeBtn(text, status){\n      var btn = document.createElement('button');\n      btn.innerHTML = text;\n      btn.style.marginTop = '5px';\n      btn.style.display = 'block';\n\n      btn.onclick = function(){\n        if(!code){\n          alert('CODE 값을 찾을 수 없습니다.');\n          return;\n        }\n        saveSurveyPoint(code, lat, lng, status);\n        map.closePopup();\n      };\n\n      return btn;\n    }\n\n    contentNode.appendChild(makeBtn('조사완료', '완료'));\n    contentNode.appendChild(makeBtn('폐업', '폐업'));\n    contentNode.appendChild(makeBtn('거절', '거절'));\n  });\n\n  fetchSurveyData();\n  setInterval(fetchSurveyData, 10000);\n}\n).call(this.getMap(), el, x, data);\n}","data":null}]}}</script>
